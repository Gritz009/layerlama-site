<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layer Lama — Commission Manager</title>
    <meta name="description" content="Manage Layer Lama 3D printing commissions">
    <meta name="theme-color" content="#060606">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #E8812B; --orange-deep: #D06A10; --orange-hot: #FF9130; --bg: #060606; --bg-card: #0F0F0F; --bg-surface: #151515; --border: #1E1E1E; --text: #EDEDED; --text-muted: #8A8A8A; --accent-gradient: linear-gradient(135deg, #E8812B, #FF9130, #E03530); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

        /* Header */
        .header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(6,6,6,0.92); backdrop-filter: blur(20px); z-index: 100; }
        .header-left h1 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; }
        .header-left h1 span { background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-left p { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }
        .header-right { display: flex; gap: 0.75rem; align-items: center; }
        .btn { padding: 0.5rem 1.1rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s; border: none; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, var(--orange), var(--orange-deep)); color: #fff; }
        .btn-primary:hover { background: linear-gradient(135deg, var(--orange-hot), var(--orange)); color: #000; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: #4ADE80; box-shadow: 0 0 6px rgba(74,222,128,0.4); }
        .status-dot.offline { background: #EF4444; }

        /* Stats row */
        .stats-row { display: flex; gap: 0.75rem; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .stat-chip { padding: 0.6rem 1rem; border-radius: 10px; background: var(--bg-card); border: 1px solid var(--border); min-width: fit-content; cursor: pointer; transition: all 0.3s; }
        .stat-chip:hover, .stat-chip.active { border-color: var(--orange); }
        .stat-chip .num { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
        .stat-chip .label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.1rem; }
        .stat-chip.new .num { color: #FF9130; }
        .stat-chip.progress .num { color: #7DD3FC; }
        .stat-chip.done .num { color: #4ADE80; }
        .stat-chip.all .num { color: var(--text); }

        /* Content */
        .content { display: flex; height: calc(100vh - 140px); }
        .list-panel { flex: 1; overflow-y: auto; border-right: 1px solid var(--border); }
        .detail-panel { width: 420px; overflow-y: auto; background: var(--bg-card); display: none; }
        .detail-panel.open { display: block; }

        /* Cards */
        .card { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
        .card:hover { background: var(--bg-surface); }
        .card.selected { background: var(--bg-surface); border-left: 3px solid var(--orange); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
        .card-name { font-weight: 700; font-size: 0.95rem; }
        .badge { padding: 0.15rem 0.55rem; border-radius: 100px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
        .badge-new { background: rgba(255,145,48,0.12); color: #FF9130; }
        .badge-progress { background: rgba(125,211,252,0.12); color: #7DD3FC; }
        .badge-done { background: rgba(74,222,128,0.12); color: #4ADE80; }
        .card-type { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .card-details { font-size: 0.76rem; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-footer { display: flex; justify-content: space-between; font-size: 0.68rem; color: #444; margin-top: 0.35rem; }

        /* Detail panel */
        .detail-header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        .detail-header h2 { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 700; margin-bottom: 0.25rem; }
        .detail-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; float: right; }
        .detail-body { padding: 1.5rem; }
        .field { margin-bottom: 1rem; }
        .field-label { font-size: 0.68rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
        .field-value { font-size: 0.9rem; }
        .field-value.details-text { background: #0A0A0A; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border); line-height: 1.5; font-size: 0.85rem; color: #CCC; }
        .status-buttons { display: flex; gap: 0.35rem; flex-wrap: wrap; }
        .status-btn { padding: 0.3rem 0.75rem; border-radius: 100px; font-size: 0.7rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); transition: all 0.3s; font-family: inherit; }
        .status-btn:hover { border-color: var(--orange); color: var(--orange); }
        .status-btn.active { border-color: currentColor; opacity: 1; }
        .status-btn.active-new { background: rgba(255,145,48,0.12); color: #FF9130; border-color: #FF9130; }
        .status-btn.active-progress { background: rgba(125,211,252,0.12); color: #7DD3FC; border-color: #7DD3FC; }
        .status-btn.active-done { background: rgba(74,222,128,0.12); color: #4ADE80; border-color: #4ADE80; }
        .email-btn { display: inline-block; margin-top: 1rem; background: linear-gradient(135deg, var(--orange), var(--orange-deep)); color: #fff; padding: 0.55rem 1.25rem; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.8rem; transition: all 0.3s; }
        .email-btn:hover { color: #000; }
        .notion-link { display: inline-block; margin-top: 0.5rem; margin-left: 0.5rem; color: var(--text-muted); font-size: 0.8rem; text-decoration: none; border: 1px solid var(--border); padding: 0.55rem 1.25rem; border-radius: 8px; transition: all 0.3s; }
        .notion-link:hover { border-color: var(--orange); color: var(--orange); }

        /* Empty state */
        .empty { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
        .empty h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }

        /* Loading */
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .content { flex-direction: column; height: auto; }
            .list-panel { border-right: none; max-height: 50vh; }
            .detail-panel { width: 100%; border-top: 1px solid var(--border); }
            .stats-row { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1>🦙 Layer <span>Lama</span></h1>
            <p>Commission Manager <span class="status-dot online" id="statusDot"></span> <span id="statusText" style="font-size:0.7rem;color:#4ADE80;">Connected</span></p>
        </div>
        <div class="header-right">
            <span id="lastUpdate" style="font-size:0.72rem;color:#555;"></span>
            <button class="btn btn-ghost" onclick="loadRecords()">↻ Refresh</button>
            <a href="https://www.notion.so/1584f3cb6229402d8021e2dfcbd93d33" target="_blank" class="btn btn-ghost">Open Notion ↗</a>
        </div>
    </div>

    <div class="stats-row" id="statsRow">
        <div class="stat-chip all active" onclick="filterBy('all')"><div class="num" id="countAll">-</div><div class="label">Total</div></div>
        <div class="stat-chip new" onclick="filterBy('Not started')"><div class="num" id="countNew">-</div><div class="label">New</div></div>
        <div class="stat-chip progress" onclick="filterBy('In progress')"><div class="num" id="countProgress">-</div><div class="label">In Progress</div></div>
        <div class="stat-chip done" onclick="filterBy('Done')"><div class="num" id="countDone">-</div><div class="label">Completed</div></div>
    </div>

    <div class="content">
        <div class="list-panel" id="listPanel">
            <div class="empty"><div class="loading-spinner"></div><p style="margin-top:1rem">Loading commissions from Notion...</p></div>
        </div>
        <div class="detail-panel" id="detailPanel"></div>
    </div>

    <script>
        const NOTION_DB_URL = 'https://www.notion.so/1584f3cb6229402d8021e2dfcbd93d33';
        const DATA_SOURCE_ID = '287207d7-b35b-4a0f-8241-a13da2cad4ae';

        let records = [];
        let currentFilter = 'all';
        let selectedId = null;

        async function loadRecords() {
            document.getElementById('statusText').textContent = 'Syncing...';
            document.getElementById('statusText').style.color = '#FF9130';

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 4000,
                        system: 'You retrieve Notion database records. Return ONLY a JSON array. Each object: {id, url, project_name, client_name, email, project_type, details, status, submitted, priority, quoted_price, request_id, notes}. No markdown, no explanation, just the JSON array. If no records found, return [].',
                        messages: [{ role: 'user', content: 'Fetch all pages from the Notion database. The database URL is ' + NOTION_DB_URL + '. Return all records as a JSON array.' }],
                        mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion' }]
                    })
                });

                const data = await res.json();
                const textBlocks = data.content?.filter(b => b.type === 'text').map(b => b.text) || [];
                const fullText = textBlocks.join('\n');
                const jsonMatch = fullText.match(/\[[\s\S]*\]/);

                if (jsonMatch) {
                    records = JSON.parse(jsonMatch[0]);
                } else {
                    records = [];
                }

                document.getElementById('statusText').textContent = 'Connected';
                document.getElementById('statusText').style.color = '#4ADE80';
                document.getElementById('statusDot').className = 'status-dot online';
                document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();

            } catch (err) {
                document.getElementById('statusText').textContent = 'Offline';
                document.getElementById('statusText').style.color = '#EF4444';
                document.getElementById('statusDot').className = 'status-dot offline';
                console.error(err);
            }

            updateCounts();
            renderList();
        }

        function updateCounts() {
            document.getElementById('countAll').textContent = records.length;
            document.getElementById('countNew').textContent = records.filter(r => r.status === 'Not started').length;
            document.getElementById('countProgress').textContent = records.filter(r => r.status === 'In progress').length;
            document.getElementById('countDone').textContent = records.filter(r => r.status === 'Done').length;
        }

        function filterBy(status) {
            currentFilter = status;
            document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
            if (status === 'all') document.querySelector('.stat-chip.all').classList.add('active');
            else if (status === 'Not started') document.querySelector('.stat-chip.new').classList.add('active');
            else if (status === 'In progress') document.querySelector('.stat-chip.progress').classList.add('active');
            else if (status === 'Done') document.querySelector('.stat-chip.done').classList.add('active');
            renderList();
        }

        function renderList() {
            const panel = document.getElementById('listPanel');
            const filtered = currentFilter === 'all' ? records : records.filter(r => r.status === currentFilter);

            if (filtered.length === 0) {
                panel.innerHTML = '<div class="empty"><h3>No requests found</h3><p>Submissions from your website will appear here automatically.</p></div>';
                return;
            }

            panel.innerHTML = filtered.map(r => {
                const badgeClass = r.status === 'Not started' ? 'badge-new' : r.status === 'In progress' ? 'badge-progress' : 'badge-done';
                const statusLabel = r.status === 'Not started' ? 'New' : r.status;
                return `<div class="card ${selectedId === r.id ? 'selected' : ''}" onclick="selectRecord('${r.id}')">
                    <div class="card-top">
                        <span class="card-name">${r.project_name || r.client_name || 'Untitled'}</span>
                        <span class="badge ${badgeClass}">${statusLabel}</span>
                    </div>
                    <div class="card-type">${r.project_type || '—'} · ${r.client_name || '—'}</div>
                    <div class="card-details">${r.details || 'No details'}</div>
                    <div class="card-footer"><span>${r.submitted || '—'}</span><span>${r.email || ''}</span></div>
                </div>`;
            }).join('');
        }

        function selectRecord(id) {
            selectedId = id;
            const r = records.find(rec => rec.id === id);
            if (!r) return;

            const panel = document.getElementById('detailPanel');
            panel.classList.add('open');

            const statusBtns = ['Not started', 'In progress', 'Done'].map(s => {
                const cls = r.status === s ? (s === 'Not started' ? 'active active-new' : s === 'In progress' ? 'active active-progress' : 'active active-done') : '';
                return `<button class="status-btn ${cls}" onclick="updateStatus('${id}', '${s}')">${s === 'Not started' ? 'New' : s}</button>`;
            }).join('');

            panel.innerHTML = `
                <div class="detail-header">
                    <button class="detail-close" onclick="closeDetail()">×</button>
                    <h2>${r.project_name || 'Untitled Request'}</h2>
                    <span style="font-size:0.78rem;color:var(--text-muted)">${r.request_id || ''}</span>
                </div>
                <div class="detail-body">
                    <div class="field"><div class="field-label">Client</div><div class="field-value">${r.client_name || '—'}</div></div>
                    <div class="field"><div class="field-label">Email</div><div class="field-value">${r.email || '—'}</div></div>
                    <div class="field"><div class="field-label">Project Type</div><div class="field-value">${r.project_type || '—'}</div></div>
                    <div class="field"><div class="field-label">Priority</div><div class="field-value">${r.priority || 'Not set'}</div></div>
                    <div class="field"><div class="field-label">Submitted</div><div class="field-value">${r.submitted || '—'}</div></div>
                    <div class="field"><div class="field-label">Quoted Price</div><div class="field-value">${r.quoted_price ? '€' + r.quoted_price : 'Not quoted'}</div></div>
                    <div class="field"><div class="field-label">Details</div><div class="field-value details-text">${r.details || 'No details provided.'}</div></div>
                    <div class="field"><div class="field-label">Notes</div><div class="field-value details-text">${r.notes || 'No notes yet.'}</div></div>
                    <div class="field"><div class="field-label">Status</div><div class="status-buttons">${statusBtns}</div></div>
                    ${r.email ? `<a href="mailto:${r.email}?subject=Re: ${r.project_type || 'Your Project'} - Layer Lama" class="email-btn">Reply via Email →</a>` : ''}
                    ${r.url ? `<a href="https://www.notion.so/${r.url || r.id}" target="_blank" class="notion-link">Open in Notion ↗</a>` : ''}
                </div>`;

            renderList();
        }

        async function updateStatus(id, newStatus) {
            const r = records.find(rec => rec.id === id);
            if (!r || r.status === newStatus) return;

            try {
                await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: 'Update the Notion page status. Just confirm when done.',
                        messages: [{ role: 'user', content: `Update the Notion page with ID "${id}". Set the "Status" property to "${newStatus}".` }],
                        mcp_servers: [{ type: 'url', url: 'https://mcp.notion.com/mcp', name: 'notion' }]
                    })
                });

                r.status = newStatus;
                updateCounts();
                selectRecord(id);
            } catch (err) {
                console.error('Failed to update:', err);
            }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('open');
            selectedId = null;
            renderList();
        }

        // Register service worker for PWA install
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }

        // Auto-refresh every 2 minutes
        loadRecords();
        setInterval(loadRecords, 120000);
    </script>
</body>
</html>
